<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoali quiere ser piloto aviador</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand" id="presentationBrand">Exposici&oacute;n de Yoali ✈️</div>
    <div class="hint">Usa ← → o los botones</div>
  </header>

  <main class="slides" id="slidesRoot" aria-live="polite">
    <!-- El contenido real se renderiza desde data/content.json para facilitar cambios futuros. -->
    <section class="loading-slide">
      <div>
        <p class="kicker">✈️ Preparando vuelo</p>
        <h1>Cargando presentaci&oacute;n...</h1>
      </div>
    </section>
  </main>

  <nav class="controls" aria-label="Controles de la presentaci&oacute;n">
    <button id="prevBtn" type="button">⬅ Anterior</button>
    <div class="progress" id="progress">1 / 1</div>
    <button id="nextBtn" type="button">Siguiente ➡</button>
  </nav>

  <script src="js/slides.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
